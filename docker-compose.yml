# ─── S4Carlisle CMS — Docker Compose ─────────────────────────────────────────
#
# Prerequisites before first `docker compose up`:
#   1. cp .env.example .env  && edit .env with real values
#   2. cp ai_structuring_backend/.env.example ai_structuring_backend/.env  && edit
#   3. Build the React frontend:
#        cd frontend && npm ci && npm run build && cd ..
#   4. Create host directories expected by volume mounts:
#        mkdir -p /opt/cms_runtime/data/uploads outputs data temp_reports
#
# Start all services:
#   docker compose up -d
#
# View logs:
#   docker compose logs -f backend
#
# Run database migrations (first time or after updates):
#   docker compose exec backend alembic upgrade head

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: cms_db
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-cms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cms_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-cms_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cms_user} -d ${POSTGRES_DB:-cms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cms_redis
    # Port is NOT exposed to the host — Redis is internal only.
    # Remove the healthcheck expose if you need remote access for debugging.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms_backend
    env_file: .env
    volumes:
      # Uploads persist on the host at /opt/cms_runtime/data/uploads
      - /opt/cms_runtime/data/uploads:/opt/cms_runtime/data/uploads
      - ./outputs:/app/outputs
      - ./data:/app/data
      - ./temp_reports:/app/temp_reports
      # ref_cache.json is maintained inside the named volume to avoid the
      # "directory created instead of file" pitfall of bind-mounting a file
      # that doesn't exist yet.
      - ref_cache:/opt/cms_runtime
    environment:
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms_celery_worker
    env_file: .env
    volumes:
      - /opt/cms_runtime/data/uploads:/opt/cms_runtime/data/uploads
      - ./outputs:/app/outputs
      - ./data:/app/data
      - ./temp_reports:/app/temp_reports
      - ref_cache:/opt/cms_runtime
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # ── Collabora Online (LibreOffice) ────────────────────────────────────────
  # HOST_DOMAIN and HOST_PORT are read from .env.
  # They must match the public address browsers use to reach this server,
  # because Collabora embeds that address in editor iframe URLs.
  collabora:
    image: collabora/code
    container_name: cms_collabora
    env_file: .env
    environment:
      # Allow WOPI requests originating from both the public URL and the
      # internal backend service URL.
      aliasgroup1: "http://${HOST_DOMAIN:-localhost}:${HOST_PORT:-8080}"
      aliasgroup2: "http://backend:8000"
      DONT_GEN_SSL_CERT: "YES"
      extra_params: >-
        --o:ssl.enable=false
        --o:ssl.termination=false
        --o:net.proto=IPv4
        --o:server_name=${HOST_DOMAIN:-localhost}:${HOST_PORT:-8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9980:9980"
    restart: always

  # ── AI Structuring Service ────────────────────────────────────────────────
  ai_structuring:
    build:
      context: ./ai_structuring_backend
      dockerfile: Dockerfile
    container_name: cms_ai_structuring
    env_file: ./ai_structuring_backend/.env
    expose:
      - "5000"
    volumes:
      - ai_structuring_uploads:/app/uploads
      - ai_structuring_outputs:/app/outputs
      - ai_structuring_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: always

  # ── AI Structuring Celery Worker ──────────────────────────────────────────
  ai_structuring_worker:
    build:
      context: ./ai_structuring_backend
      dockerfile: Dockerfile
    container_name: cms_ai_structuring_worker
    command: celery -A celery_worker worker --loglevel=info --concurrency=2
    stop_grace_period: 600s
    env_file: ./ai_structuring_backend/.env
    volumes:
      - ai_structuring_uploads:/app/uploads
      - ai_structuring_outputs:/app/outputs
      - ai_structuring_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      ai_structuring:
        condition: service_healthy
    restart: always

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  # Serves:
  #   /ui/           → React SPA (built frontend/dist mounted read-only)
  #   /api/          → FastAPI backend
  #   /wopi/         → FastAPI WOPI endpoints (Collabora callbacks)
  #   /hosting/      → Collabora static assets
  #   /browser/      → Collabora static assets
  #   /cool/ /coolws/→ Collabora editor + WebSocket
  #   /              → FastAPI legacy SSR pages
  #
  # The React frontend must be built BEFORE starting this service:
  #   cd frontend && npm ci && npm run build
  nginx:
    image: nginx:alpine
    container_name: cms_nginx
    ports:
      - "${HOST_PORT:-8080}:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/var/www/ui:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - collabora
    restart: always

volumes:
  postgres_data:
  certbot_webroot:
  ref_cache:
  ai_structuring_uploads:
  ai_structuring_outputs:
  ai_structuring_data:
