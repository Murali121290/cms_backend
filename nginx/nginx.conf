
# ─────────────────────────────────────────────────────────────────────────────
# CMS Backend — Nginx Reverse Proxy Configuration
#
# Listens on port 80 (HTTP).
# In production: use certbot to add SSL/HTTPS on port 443.
#
# To enable HTTPS after container is running:
#   docker-compose exec nginx certbot --nginx -d your-domain.com
# ─────────────────────────────────────────────────────────────────────────────

# Allow large DOCX/PDF file uploads (up to 200MB)
client_max_body_size 200M;

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;   # Accept all hostnames; replace with your domain in production

    # ── FastAPI Application ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        # Required headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (required for Collabora / LibreOffice Online)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Long timeouts for document processing (reference validation, bias scan, etc.)
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
    }

    # ── Static files (served directly by Nginx for speed) ───────────────────
    location /static/ {
        proxy_pass http://backend/static/;
        proxy_cache_bypass $http_upgrade;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check endpoint ────────────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://backend/;
    }
}
