client_max_body_size 10G;

upstream backend {
    server backend:8000;
}

upstream onlyoffice_upstream {
    server onlyoffice:80;
}

upstream collabora_upstream {
    server collabora:9980;
}

server {
    listen 80;
    server_name _;

    # ── OnlyOffice ────────────────────────────────────────────────────────────
    location ~* ^/(web-apps|cache|coauthoring|converter|healthcheck) {
        proxy_pass         http://onlyoffice_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Collabora / LibreOffice Online ────────────────────────────────────────
    # Collabora serves its own static assets under /hosting/ and /browser/.
    location ^~ /hosting/ {
        proxy_pass http://collabora_upstream;
        proxy_set_header Host             $http_host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location ^~ /browser/ {
        proxy_pass http://collabora_upstream;
        proxy_set_header Host             $http_host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Collabora WebSocket connections (document editing channel).
    location ^~ /coolws/ {
        proxy_pass         http://collabora_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Forwarded-Port  8080;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    location ^~ /cool/ {
        proxy_pass         http://collabora_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host             $http_host;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Forwarded-Port  8080;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── Redirect old /ui/* URLs to new root structure ──────────────────────
    location ^~ /ui/ {
        rewrite ^/ui/(.*)$ /$1 last;
    }

    # ── React SPA (served from /) ────────────────────────────────────────────
    # All requests to / are served from the built frontend/dist volume.
    # Fallback to index.html so React Router handles deep links and page refreshes.
    # Static assets (JS, CSS) are cached for 1 year.
    location = /index.html {
        root /var/www/ui;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~* \.(js|css|json|woff|woff2|ttf|otf)$ {
        root /var/www/ui;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── WebDAV (MS Word desktop open/save) ───────────────────────────────────
    # Word opens files via ms-word:ofe|u|<url> and then issues PROPFIND/LOCK/GET/PUT.
    # Must proxy ALL HTTP methods including PROPFIND, LOCK, UNLOCK.
    location ^~ /webdav/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host             $http_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout    300s;
        proxy_connect_timeout  60s;
        proxy_send_timeout    300s;
        # Pass body unchanged for PUT (save back)
        proxy_request_buffering off;
    }

    # ── WOPI (LibreOffice Online callbacks) ───────────────────────────────────
    # Collabora calls back to /wopi/files/... to read/write documents.
    # Needs long timeouts because file operations on large DOCX can take time.
    location ^~ /wopi/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host             $http_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout    300s;
        proxy_connect_timeout  60s;
        proxy_send_timeout    300s;
    }

    # ── API ───────────────────────────────────────────────────────────────────
    # All /api/ calls forwarded to FastAPI. Processing jobs can be slow
    # so read/send timeouts are intentionally generous.
    # Note: /api/metrics is also proxied here (no special /api/v2 prefix needed)
    location ^~ /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host             $http_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        proxy_connect_timeout  60s;
        proxy_send_timeout    300s;
        # Cookie handling: preserve domain and path from upstream
        proxy_cookie_path   /  /;
        proxy_cookie_flags  ~ secure httponly samesite=lax;
    }

    # ── React SPA catch-all ───────────────────────────────────────────────────
    # Serve React app for all routes; SPA router handles deep links and redirects.
    # This ensures that routes like /dashboard, /login, etc. are handled by the
    # React app, not the backend.
    location / {
        root /var/www/ui;
        try_files $uri /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
